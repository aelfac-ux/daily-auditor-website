<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">稽核人員的 AI 能力堆疊 / AI capability stack for auditors</title><desc id="desc">Prompt、證據驗證與風險治理的雙語能力架構。</desc><rect width="1200" height="675" fill="#f7f3e8"/><g font-family="Arial,'Noto Sans TC',sans-serif"><text x="90" y="78" font-size="25" font-weight="700" fill="#df714c">AI × AUDIT · DAY 01</text><text x="90" y="126" font-size="39" font-weight="700" fill="#173c36">Prompt 只是入口，治理才是護城河</text><text x="90" y="158" font-size="20" fill="#66736f">PROMPTS OPEN THE DOOR; GOVERNANCE PROTECTS THE VALUE.</text><rect x="170" y="470" width="860" height="115" rx="10" fill="#dcebe2"/><text x="230" y="508" font-size="20" font-weight="700" fill="#173c36">01 · PROMPT 操作 / PROMPTING</text><text x="230" y="540" font-size="18" fill="#51615c">拆解任務 · 提供脈絡 · 定義輸出</text><text x="230" y="566" font-size="14" fill="#66736f">Break down tasks · Add context · Define outputs</text><rect x="250" y="330" width="700" height="115" rx="10" fill="#7ca896"/><text x="310" y="368" font-size="20" font-weight="700" fill="#fff">02 · 證據驗證 / EVIDENCE</text><text x="310" y="400" font-size="18" fill="#eff7f1">追查來源 · 重做計算 · 辨識偏誤</text><text x="310" y="426" font-size="14" fill="#eff7f1">Trace sources · Recalculate · Detect bias</text><rect x="330" y="190" width="540" height="115" rx="10" fill="#173c36"/><text x="390" y="228" font-size="20" font-weight="700" fill="#fff">03 · 風險治理 / GOVERNANCE</text><text x="390" y="260" font-size="18" fill="#bed5ca">資料界線 · 人工覆核 · 責任歸屬</text><text x="390" y="286" font-size="14" fill="#bed5ca">Data boundaries · Human review · Accountability</text><path d="M1070 535V260" stroke="#df714c" stroke-width="5"/><path d="M1048 285l22-30 22 30" fill="none" stroke="#df714c" stroke-width="5"/><text x="910" y="210" font-size="17" font-weight="700" fill="#df714c">專業價值 / PROFESSIONAL VALUE ↑</text></g></svg>
