<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">稽核人員的 AI 能力堆疊</title><desc id="desc">從 Prompt 操作、證據驗證到風險治理的三層能力架構</desc>
  <rect width="1200" height="675" fill="#f7f3e8"/><text x="90" y="95" font-family="Arial,'Noto Sans TC',sans-serif" font-size="25" font-weight="700" fill="#df714c">AI × AUDIT · DAY 01</text><text x="90" y="145" font-family="Arial,'Noto Serif TC',serif" font-size="42" font-weight="700" fill="#173c36">Prompt 只是入口，治理才是護城河</text>
  <rect x="170" y="470" width="860" height="105" rx="10" fill="#dcebe2"/><text x="230" y="512" font-family="Arial,'Noto Sans TC',sans-serif" font-size="20" font-weight="700" fill="#173c36">01 · PROMPT 操作</text><text x="230" y="545" font-family="Arial,'Noto Sans TC',sans-serif" font-size="18" fill="#51615c">拆解任務 · 提供脈絡 · 定義輸出</text>
  <rect x="250" y="335" width="700" height="105" rx="10" fill="#7ca896"/><text x="310" y="377" font-family="Arial,'Noto Sans TC',sans-serif" font-size="20" font-weight="700" fill="#fff">02 · 證據驗證</text><text x="310" y="410" font-family="Arial,'Noto Sans TC',sans-serif" font-size="18" fill="#eff7f1">追查來源 · 重做計算 · 辨識偏誤</text>
  <rect x="330" y="200" width="540" height="105" rx="10" fill="#173c36"/><text x="390" y="242" font-family="Arial,'Noto Sans TC',sans-serif" font-size="20" font-weight="700" fill="#fff">03 · 風險治理</text><text x="390" y="275" font-family="Arial,'Noto Sans TC',sans-serif" font-size="18" fill="#bed5ca">資料界線 · 人工覆核 · 責任歸屬</text>
  <path d="M1070 535V230" stroke="#df714c" stroke-width="5"/><path d="M1048 255l22-30 22 30" fill="none" stroke="#df714c" stroke-width="5"/><text x="1090" y="392" transform="rotate(-90 1090 392)" font-family="Arial,'Noto Sans TC',sans-serif" font-size="18" font-weight="700" fill="#df714c">專業價值提升</text>
</svg>
