<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">稽核第二大腦 / Auditor's second brain</title><desc id="desc">線索經 CODE 流程成為可搜尋與複用的知識。</desc><rect width="1200" height="680" fill="#f7f3e8"/><path d="M0 570C180 520 250 650 430 590s300-70 470 0 180 30 300-30v120H0z" fill="#dcebe2"/><g fill="none" stroke="#173c36" stroke-width="3"><path stroke-dasharray="9 12" d="M170 205C300 120 365 335 505 235S735 170 838 292s162 78 212-42"/><circle cx="169" cy="205" r="100"/><rect x="430" y="157" width="250" height="162" rx="8"/><path d="M457 190h196M457 225h155M457 260h180M865 175h200v212H865zM890 215h150M890 255h150M890 295h112M890 335h125"/></g><g font-family="Arial,'Noto Sans TC',sans-serif" fill="#173c36" text-anchor="middle"><text x="169" y="184" font-size="21" font-weight="700">案件線索</text><text x="169" y="210" font-size="14">CASE CLUES</text><text x="169" y="236" font-size="14">判斷 · 疑問 · 方法</text><text x="555" y="130" font-size="16" fill="#df714c" font-weight="700">CODE</text><text x="555" y="355" font-size="15">擷取 → 組織 → 萃取 → 表達</text><text x="555" y="380" font-size="13">CAPTURE → ORGANIZE → DISTILL → EXPRESS</text><text x="965" y="145" font-size="16" fill="#df714c" font-weight="700">SECOND BRAIN</text><text x="965" y="430" font-size="15">可搜尋 · 可複用 · 可傳承</text><text x="965" y="454" font-size="13">SEARCH · REUSE · TRANSFER</text><text x="600" y="612" font-size="25" font-weight="700">把經驗畫成下一次找得到的航線</text><text x="600" y="642" font-size="15">TURN EXPERIENCE INTO A MAP YOUR FUTURE CREW CAN FIND.</text></g></svg>
