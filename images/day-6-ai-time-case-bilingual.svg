<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">稽核工時重新分配 / Reclaiming audit time</title><desc id="desc">AI 與自動化接手可規則化工作，將工時還給風險判斷與溝通。</desc><rect width="1200" height="680" fill="#f7f3e8"/><g font-family="Arial,'Noto Sans TC',sans-serif"><text x="70" y="70" fill="#df714c" font-size="24" font-weight="700">AI × AUDIT · DAY 06</text><text x="70" y="117" fill="#173c36" font-size="39" font-weight="700">工時沒有消失，只是被分配錯了</text><text x="70" y="150" fill="#66736f" font-size="19">TIME WAS NOT STOLEN. IT WAS ASSIGNED TO THE WRONG WORK.</text><rect x="70" y="205" width="450" height="315" rx="18" fill="#173c36"/><text x="105" y="250" fill="#fff" font-size="22" font-weight="700">改善前 / BEFORE</text><rect x="105" y="285" width="350" height="58" rx="6" fill="#df714c"/><text x="122" y="321" fill="#fff" font-size="17">資料整理 · DATA PREP</text><rect x="105" y="355" width="285" height="58" rx="6" fill="#7ca896"/><text x="122" y="391" fill="#fff" font-size="17">文件比對 · MATCHING</text><rect x="105" y="425" width="215" height="58" rx="6" fill="#dcebe2"/><text x="122" y="461" fill="#173c36" font-size="17">初稿 · DRAFTING</text><path d="M550 365h100" stroke="#df714c" stroke-width="6"/><path d="M632 344l30 21-30 21" fill="#df714c"/><text x="600" y="325" text-anchor="middle" fill="#df714c" font-size="18" font-weight="700">AI + AUTOMATION</text><rect x="680" y="205" width="450" height="315" rx="18" fill="#e2eee7"/><text x="715" y="250" fill="#173c36" font-size="22" font-weight="700">改善後 / AFTER</text><rect x="715" y="285" width="165" height="58" rx="6" fill="#df714c"/><text x="732" y="321" fill="#fff" font-size="16">執行 · EXECUTE</text><rect x="715" y="355" width="285" height="58" rx="6" fill="#3f7165"/><text x="732" y="391" fill="#fff" font-size="16">風險判斷 · JUDGMENT</text><rect x="715" y="425" width="365" height="58" rx="6" fill="#173c36"/><text x="732" y="461" fill="#fff" font-size="16">訪談與溝通 · INTERVIEWS &amp; ADVICE</text><text x="600" y="575" text-anchor="middle" fill="#173c36" font-size="23" font-weight="700">先量基準，再談 50% / MEASURE THE BASELINE BEFORE CLAIMING 50%</text><text x="600" y="615" text-anchor="middle" fill="#66736f" font-size="17">工時 ↓　錯誤率不升　證據可追溯　人工仍負責</text><text x="600" y="643" text-anchor="middle" fill="#66736f" font-size="15">LESS TIME · NO MORE ERRORS · TRACEABLE EVIDENCE · HUMAN ACCOUNTABILITY</text></g></svg>
