<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
<title id="title">雲端協作、本機查核的資料保密流程</title><desc id="desc">敏感資料留在本機，去識別化結構送至雲端 AI 協助撰寫程式，安全檢查後在本機執行並輸出異常樣本與稽核紀錄。</desc>
<rect width="1200" height="680" fill="#f7f3e8"/><text x="70" y="72" fill="#173c36" font-family="sans-serif" font-size="32" font-weight="700">雲端協作、本機查核：資料不離開公司環境</text>
<rect x="70" y="120" width="680" height="480" rx="22" fill="#e7f0e9" stroke="#9db8a6" stroke-width="2"/><text x="105" y="166" fill="#173c36" font-family="sans-serif" font-size="21" font-weight="700">公司本機環境｜VS Code + Python</text>
<rect x="105" y="205" width="250" height="110" rx="12" fill="#173c36"/><text x="230" y="248" text-anchor="middle" fill="white" font-family="sans-serif" font-size="20" font-weight="700">機密母體資料</text><text x="230" y="280" text-anchor="middle" fill="#c6d8d0" font-family="sans-serif" font-size="15">不離開本機</text>
<path d="M355 260 H470" stroke="#df714c" stroke-width="4" marker-end="url(#a)"/><rect x="475" y="205" width="235" height="110" rx="12" fill="white" stroke="#9db8a6" stroke-width="2"/><text x="592" y="246" text-anchor="middle" fill="#173c36" font-family="sans-serif" font-size="19" font-weight="700">本機分析程式</text><text x="592" y="277" text-anchor="middle" fill="#66736f" font-family="sans-serif" font-size="15">讀取、篩選、分層</text><path d="M592 315 V372" stroke="#df714c" stroke-width="4" marker-end="url(#a)"/>
<rect x="105" y="390" width="275" height="135" rx="12" fill="white" stroke="#9db8a6" stroke-width="2"/><text x="242" y="432" text-anchor="middle" fill="#173c36" font-family="sans-serif" font-size="19" font-weight="700">異常樣本.xlsx</text><text x="242" y="465" text-anchor="middle" fill="#66736f" font-family="sans-serif" font-size="15">高風險優先、供實地驗證</text><text x="242" y="493" text-anchor="middle" fill="#66736f" font-family="sans-serif" font-size="15">必要時遞迴縮小範圍</text>
<rect x="435" y="390" width="275" height="135" rx="12" fill="white" stroke="#9db8a6" stroke-width="2"/><text x="572" y="432" text-anchor="middle" fill="#173c36" font-family="sans-serif" font-size="19" font-weight="700">執行紀錄.txt</text><text x="572" y="465" text-anchor="middle" fill="#66736f" font-family="sans-serif" font-size="15">母體、樣本、異常筆數</text><text x="572" y="493" text-anchor="middle" fill="#66736f" font-family="sans-serif" font-size="15">規則版本與執行時間</text>
<rect x="815" y="120" width="315" height="480" rx="22" fill="#173c36"/><text x="972" y="166" text-anchor="middle" fill="white" font-family="sans-serif" font-size="21" font-weight="700">核准的雲端 AI</text>
<rect x="855" y="208" width="235" height="120" rx="12" fill="#244d46" stroke="#6f9588"/><text x="972" y="247" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="700">只接收去識別資訊</text><text x="972" y="279" text-anchor="middle" fill="#c6d8d0" font-family="sans-serif" font-size="14">欄位代號、資料型態</text><text x="972" y="304" text-anchor="middle" fill="#c6d8d0" font-family="sans-serif" font-size="14">概化分布、虛構樣本</text>
<path d="M855 365 H750" stroke="#ef9e77" stroke-width="4" marker-end="url(#b)"/><rect x="855" y="390" width="235" height="135" rx="12" fill="#244d46" stroke="#6f9588"/><text x="972" y="429" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="700">產生 Python 草稿</text><text x="972" y="461" text-anchor="middle" fill="#c6d8d0" font-family="sans-serif" font-size="14">再做人工與 AI 安全檢查</text><text x="972" y="488" text-anchor="middle" fill="#c6d8d0" font-family="sans-serif" font-size="14">確認後才回本機執行</text>
<text x="600" y="642" text-anchor="middle" fill="#66736f" font-family="sans-serif" font-size="16">核心原則：AI 看方法，不看公司的原始資料</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3z" fill="#df714c"/></marker><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3z" fill="#ef9e77"/></marker></defs>
</svg>
