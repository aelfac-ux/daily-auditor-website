<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">雲端協作、本機查核 / Cloud-assisted, locally executed audit</title><desc id="desc">敏感資料留在本機，雲端 AI 僅協助方法與程式。</desc><rect width="1200" height="680" fill="#f7f3e8"/><g font-family="Arial,'Noto Sans TC',sans-serif"><text x="70" y="58" fill="#173c36" font-size="31" font-weight="700">雲端協作、本機查核：資料不離開公司環境</text><text x="70" y="88" fill="#66736f" font-size="18">CLOUD-ASSISTED, LOCALLY EXECUTED: COMPANY DATA STAYS LOCAL.</text><rect x="70" y="120" width="680" height="480" rx="22" fill="#e7f0e9" stroke="#9db8a6" stroke-width="2"/><text x="105" y="158" fill="#173c36" font-size="20" font-weight="700">公司本機環境 / LOCAL ENVIRONMENT</text><text x="105" y="181" fill="#66736f" font-size="14">VS Code + Python</text><rect x="105" y="215" width="250" height="105" rx="12" fill="#173c36"/><text x="230" y="253" text-anchor="middle" fill="white" font-size="19" font-weight="700">機密母體資料</text><text x="230" y="278" text-anchor="middle" fill="#c6d8d0" font-size="14">CONFIDENTIAL POPULATION</text><text x="230" y="300" text-anchor="middle" fill="#c6d8d0" font-size="13">Never leaves the machine</text><path d="M355 267H470" stroke="#df714c" stroke-width="4"/><rect x="475" y="215" width="235" height="105" rx="12" fill="white" stroke="#9db8a6" stroke-width="2"/><text x="592" y="252" text-anchor="middle" fill="#173c36" font-size="18" font-weight="700">本機分析程式</text><text x="592" y="278" text-anchor="middle" fill="#66736f" font-size="14">LOCAL ANALYSIS CODE</text><text x="592" y="300" text-anchor="middle" fill="#66736f" font-size="13">Read · Filter · Stratify</text><rect x="105" y="390" width="275" height="135" rx="12" fill="white" stroke="#9db8a6" stroke-width="2"/><text x="242" y="430" text-anchor="middle" fill="#173c36" font-size="18" font-weight="700">異常樣本.xlsx</text><text x="242" y="456" text-anchor="middle" fill="#66736f" font-size="14">EXCEPTION SAMPLE</text><text x="242" y="482" text-anchor="middle" fill="#66736f" font-size="13">Risk-ranked for human testing</text><rect x="435" y="390" width="275" height="135" rx="12" fill="white" stroke="#9db8a6" stroke-width="2"/><text x="572" y="430" text-anchor="middle" fill="#173c36" font-size="18" font-weight="700">執行紀錄.txt</text><text x="572" y="456" text-anchor="middle" fill="#66736f" font-size="14">EXECUTION LOG</text><text x="572" y="482" text-anchor="middle" fill="#66736f" font-size="13">Counts · Rules · Timestamp</text><rect x="815" y="120" width="315" height="480" rx="22" fill="#173c36"/><text x="972" y="158" text-anchor="middle" fill="white" font-size="20" font-weight="700">核准的雲端 AI</text><text x="972" y="181" text-anchor="middle" fill="#c6d8d0" font-size="14">APPROVED CLOUD AI</text><rect x="855" y="215" width="235" height="115" rx="12" fill="#244d46"/><text x="972" y="250" text-anchor="middle" fill="white" font-size="17" font-weight="700">只接收去識別資訊</text><text x="972" y="276" text-anchor="middle" fill="#c6d8d0" font-size="14">DE-IDENTIFIED INPUTS ONLY</text><text x="972" y="301" text-anchor="middle" fill="#c6d8d0" font-size="13">Schema · Types · Synthetic data</text><rect x="855" y="390" width="235" height="135" rx="12" fill="#244d46"/><text x="972" y="428" text-anchor="middle" fill="white" font-size="17" font-weight="700">產生 Python 草稿</text><text x="972" y="454" text-anchor="middle" fill="#c6d8d0" font-size="14">DRAFT PYTHON CODE</text><text x="972" y="480" text-anchor="middle" fill="#c6d8d0" font-size="13">Human security review first</text><path d="M855 365H750" stroke="#ef9e77" stroke-width="4"/><text x="600" y="645" text-anchor="middle" fill="#66736f" font-size="16">AI 看方法，不看原始資料 · AI SEES THE METHOD, NOT THE RAW DATA.</text></g></svg>
