<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">RPA 固定航線與 AI Agent 動態迴圈</title><desc id="desc">左側 RPA 沿固定航線依序執行，右側 AI Agent 在觀察、決定、行動、檢查之間循環。</desc><rect width="1200" height="680" fill="#f7f3e8"/><path d="M0 590c170-75 330 70 510 0s350 65 690-20v110H0z" fill="#dcebe2"/><g font-family="Noto Sans TC,Microsoft JhengHei,sans-serif"><text x="300" y="95" text-anchor="middle" fill="#173c36" font-size="30" font-weight="700">RPA｜照航線行駛</text><text x="900" y="95" text-anchor="middle" fill="#173c36" font-size="30" font-weight="700">AI AGENT｜看海象調整</text><g fill="#fff" stroke="#173c36" stroke-width="3"><rect x="90" y="220" width="125" height="80" rx="8"/><rect x="245" y="220" width="125" height="80" rx="8"/><rect x="400" y="220" width="125" height="80" rx="8"/></g><g fill="#173c36" font-size="18" text-anchor="middle"><text x="152" y="268">下載</text><text x="307" y="268">擷取</text><text x="462" y="268">比對</text></g><path d="M215 260h30m125 0h30" stroke="#df714c" stroke-width="5"/><path d="M518 249l18 11-18 11m-155-22 18 11-18 11" fill="#df714c"/><g fill="#fff" stroke="#173c36" stroke-width="3"><circle cx="900" cy="220" r="70"/><circle cx="1025" cy="360" r="70"/><circle cx="900" cy="500" r="70"/><circle cx="775" cy="360" r="70"/></g><g fill="#173c36" font-size="18" text-anchor="middle"><text x="900" y="226">觀察</text><text x="1025" y="366">決定</text><text x="900" y="506">行動</text><text x="775" y="366">檢查</text></g><path d="M954 263c37 15 52 31 60 48m-31 100c-13 28-30 44-51 55m-87 0c-27-13-44-30-55-54m0-104c13-26 29-42 55-53" fill="none" stroke="#df714c" stroke-width="5" stroke-dasharray="8 8"/><text x="300" y="410" text-anchor="middle" fill="#66736f" font-size="18">規則穩定時，快速又可靠</text><text x="900" y="610" text-anchor="middle" fill="#66736f" font-size="18">遇到例外，選工具、改路線或找人</text></g></svg>
